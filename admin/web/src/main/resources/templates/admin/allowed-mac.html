<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head(#{admin.allowedMacs.page.title})}"></head>
<body class="app-shell">
<div th:replace="~{admin/fragments/header :: header('WiFi Manager')}"></div>
<main class="app-main md:min-h-[calc(100vh-4rem-3rem)]">
    <section class="hero-shell mb-6">
        <div class="relative z-10 space-y-4">
            <div class="hero-kicker" th:text="#{admin.nav.admin}">Admin</div>
            <h1 class="hero-title text-3xl md:text-5xl" th:text="#{admin.allowedMacs.panel.title}">Network operations</h1>
            <p class="hero-copy max-w-3xl" th:text="#{admin.allowedMacs.panel.subtitle}">
                Manage allowlisted devices and inspect the live router view from one workspace.
            </p>
        </div>
    </section>

    <div class="grid gap-6 md:grid-cols-2 md:items-stretch md:min-h-[calc(100vh-4rem-3rem)]">
        <div class="md:h-full" th:replace="~{admin/fragments/network-clients :: networkClientList}"></div>
        <div class="md:h-full" th:replace="~{admin/fragments/allowed-mac :: allowedMacList}"></div>
    </div>
</main>
</body>
</html>
