<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head(#{admin.allowedMacs.page.title})}"></head>
<body class="app-shell">
<div th:replace="~{admin/fragments/header :: header('WiFi Manager')}"></div>
<main class="app-main">
    <div class="mb-7">
        <div class="hero-kicker" th:text="#{admin.nav.admin}">Admin</div>
        <h1 class="text-3xl font-semibold tracking-[-0.03em] md:text-4xl"
            th:text="#{admin.allowedMacs.panel.title}">Network allowlist</h1>
        <p class="mt-2 max-w-2xl text-sm leading-relaxed text-text-muted"
           th:text="#{admin.allowedMacs.panel.subtitle}">
            Manage allowlisted devices and inspect the live router view from one workspace.
        </p>
    </div>

    <div class="space-y-4">
        <div th:replace="~{admin/fragments/allowed-mac :: allowedMacList}"></div>

        <details class="card overflow-hidden border border-border/60 !p-0">
            <summary class="flex cursor-pointer list-none items-center gap-3 bg-white px-6 py-4 select-none transition-colors duration-150 hover:bg-[rgb(var(--surface-muted))]">
                <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl bg-[rgb(var(--surface-muted))] text-text-muted">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12H3a9 9 0 0 0 18 0h-2"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v4M12 17v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M3 12H1M23 12h-2M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                    </svg>
                </span>
                <div class="flex-1">
                    <span class="text-sm font-semibold" th:text="#{admin.networkClients.title}">Router clients</span>
                    <span class="ml-2 hidden text-xs text-text-muted sm:inline"
                          th:text="#{admin.networkClients.subtitle}">Live view from router.</span>
                </div>
                <svg class="details-chevron h-4 w-4 text-text-muted transition-transform duration-200"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m6 9 6 6 6-6"/>
                </svg>
            </summary>
            <div class="border-t border-border/50"
                 th:replace="~{admin/fragments/network-clients :: networkClientList}"></div>
        </details>
    </div>
</main>
</body>
</html>
