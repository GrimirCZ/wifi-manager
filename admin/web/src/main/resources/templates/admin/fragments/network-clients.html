<!DOCTYPE html>
<div th:fragment="networkClientList" xmlns:th="http://www.thymeleaf.org" id="network-client-list"
     class="space-y-4 border-t border-border/50 px-6 py-5">
    <div class="flex items-center justify-between gap-3">
        <p class="text-xs text-text-muted" th:text="#{admin.networkClients.prefill}">
            Select a device to prefill the MAC address above.
        </p>
        <button class="btn btn-secondary h-9 shrink-0 px-3 text-xs" type="button"
                th:hx-get="@{/admin/_network-clients}"
                hx-target="#network-client-list"
                hx-swap="outerHTML">
            <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 4v4h-4M4 20v-4h4"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M4.51 9a8 8 0 0 1 14.07-1.27M19.49 15a8 8 0 0 1-14.07 1.27"/>
            </svg>
            <span class="btn-text" th:text="#{admin.networkClients.load}">Refresh</span>
            <span class="spinner"></span>
        </button>
    </div>

    <div th:if="${networkClients == null or networkClients.isEmpty()}"
         class="rounded-2xl border border-border/50 px-4 py-8 text-center text-sm text-text-muted"
         th:text="#{admin.networkClients.empty}">
        No clients found. Hit Refresh to load.
    </div>

    <ul th:if="${networkClients != null and !networkClients.isEmpty()}"
        class="overflow-hidden rounded-2xl border border-border/50 divide-y divide-border/40">
        <li th:each="client : ${networkClients}"
            class="flex cursor-pointer flex-col gap-2 bg-[rgb(var(--surface-lowest))] px-4 py-3.5 transition-colors duration-100 hover:bg-[rgb(var(--surface-muted))] sm:flex-row sm:items-center sm:gap-3.5"
            th:attr="data-mac=${client.macAddress},data-hostname=${client.hostname}"
            data-script="on click
                           set #allowed-mac-input.value to my @data-mac
                           then set #allowed-mac-hostname.value to my @data-hostname
                           then add .input-highlight to #allowed-mac-input
                           then call #allowed-mac-input.scrollIntoView({ behavior: 'smooth', block: 'center' })
                           then wait 2s
                           then remove .input-highlight from #allowed-mac-input">
            <div class="flex min-w-0 flex-1 items-start gap-3">
                <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl transition-colors sm:h-9 sm:w-9"
                      th:classappend="${client.allowed ? ' bg-success/10 text-success' : ' bg-[rgb(var(--surface-muted))] text-text-muted'}">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.8" aria-hidden="true">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <path stroke-linecap="round" d="M8 21h8M12 17v4"/>
                    </svg>
                </span>

                <div class="min-w-0 flex-1">
                    <div class="flex flex-wrap items-baseline gap-2">
                        <span class="device-name"
                              th:text="${client.hostname != null ? client.hostname : #messages.msg('admin.networkClients.unknown')}">hostname</span>
                        <span th:if="${client.isLocalAdmin}"
                              class="badge shrink-0 bg-[rgb(var(--surface-muted))] text-[10px] font-semibold uppercase tracking-wide text-text-muted"
                              th:text="#{admin.allowedMacs.tag.localAdmin}">admin</span>
                    </div>
                    <div class="mt-0.5 flex flex-col sm:flex-row items-start sm:items-center sm:flex-wrap sm:gap-x-1.5">
                        <span class="font-mono text-[11px] text-text-muted" th:text="${client.macAddress}">AA:BB:CC:DD:EE:FF</span>
                        <span th:if="${client.ipAddresses != null and !client.ipAddresses.isEmpty()}"
                              class="text-[10px] text-text-muted opacity-50 hidden sm:inline">·<span>
                        <span class="text-[11px] text-text-muted">
                            <span th:each="ip, stat : ${client.ipAddresses}"
                                  th:text="${ip + (stat.last ? '' : ', ')}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <span class="badge shrink-0 whitespace-nowrap self-end text-[11px] sm:self-auto"
                  th:classappend="${client.allowed ? ' bg-success/10 text-success' : ' bg-[rgb(var(--surface-muted))] text-text-muted'}"
                  th:text="${client.allowed ? #messages.msg('admin.networkClients.allowed') : #messages.msg('admin.networkClients.select')}">
                Allowed
            </span>
        </li>
    </ul>
</div>
