<!DOCTYPE html>
<div th:fragment="allowedMacList" xmlns:th="http://www.thymeleaf.org" id="allowed-mac-list"
     class="card overflow-hidden border border-border/60 !p-0 md:grid md:grid-cols-[minmax(0,1fr)_20rem]">
    <div class="flex flex-col border-border/60 md:border-r">
        <div class="flex items-center justify-between gap-4 border-b border-border/50 px-6 py-4">
            <h2 class="text-base font-semibold tracking-[-0.02em]"
                th:text="#{admin.allowedMacs.title}">Allowed MAC addresses</h2>
            <span class="badge shrink-0 whitespace-nowrap bg-brand-100 text-brand-700 tabular-nums"
                  th:text="${allowedMacs != null ? allowedMacs.size() : 0} + ' ' + #{admin.allowedMacs.count}">
                0 entries
            </span>
        </div>

        <div th:if="${allowedMacs == null or allowedMacs.isEmpty()}"
             class="flex flex-1 flex-col items-center justify-center gap-3 px-6 py-16 text-center">
            <svg class="h-10 w-10 text-text-muted opacity-20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
            </svg>
            <div>
                <p class="text-sm font-medium text-text" th:text="#{admin.allowedMacs.empty}">No entries yet.</p>
                <p class="mt-0.5 text-xs text-text-muted" th:text="#{admin.allowedMacs.empty.help}">
                    Add a MAC address using the form.
                </p>
            </div>
        </div>

        <ul th:if="${allowedMacs != null and !allowedMacs.isEmpty()}" class="flex-1 divide-y divide-border/40">
            <li th:each="allowed : ${allowedMacs}"
                class="flex items-center gap-3 px-6 py-3 transition-colors duration-100 hover:bg-[rgb(var(--surface-muted))]">
                <span class="admin-device-icon shrink-0">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.8" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
                    </svg>
                </span>

                <div class="min-w-0 flex-1">
                    <div class="flex flex-wrap items-baseline gap-x-2">
                        <span class="min-w-0 device-name"
                              th:attr="title=${allowed.ownerEmail != null and !#strings.isEmpty(allowed.ownerEmail) ? allowed.ownerDisplayName + ' (' + allowed.ownerEmail + ')' : allowed.ownerDisplayName}"
                              th:text="${allowed.hostname != null ? allowed.hostname : #messages.msg('admin.allowedMacs.hostname.unknown')}">
                            Unknown
                        </span>
                        <span class="shrink-0 font-mono text-xs text-text-muted"
                              th:text="${allowed.mac}">AA:BB:CC:DD:EE:FF</span>
                    </div>
                    <div class="mt-0.5 truncate text-xs text-text-muted">
                        <span th:if="${!#strings.isEmpty(allowed.note)}" th:text="${allowed.note}">Note</span>
                        <span th:if="${#strings.isEmpty(allowed.note)}">
                            <span th:text="${allowed.ownerDisplayName}">Owner</span>
                            <span th:if="${allowed.ownerEmail != null and !#strings.isEmpty(allowed.ownerEmail)}"
                                  th:text="${' | ' + allowed.ownerEmail}"></span>
                        </span>
                    </div>
                </div>

                <div class="flex shrink-0 flex-col items-end gap-1.5">
                    <span class="badge whitespace-nowrap px-2 py-0.5 text-[11px]"
                          th:classappend="${allowed.validUntil != null ? ' bg-warning/10 text-text' : ' bg-brand-100 text-brand-700'}"
                          th:text="${allowed.validUntil != null ? @DateFormatter.timeRelativeNow(allowed.validUntil) : #messages.msg('admin.allowedMacs.permanent')}">
                        Permanent
                    </span>
                    <button class="btn btn-danger px-2 py-1 text-[11px] leading-none" type="button"
                            th:hx-delete="@{/admin/allowed-mac/{mac}(mac=${allowed.mac})}"
                            th:hx-confirm="#{admin.allowedMacs.delete.confirm}"
                            hx-target="#allowed-mac-list"
                            hx-swap="outerHTML">
                        <span class="btn-text" th:text="#{admin.allowedMacs.delete}">Remove</span>
                        <span class="spinner"></span>
                    </button>
                </div>
            </li>
        </ul>
    </div>

    <div class="flex flex-col border-t bg-[rgb(var(--surface-lowest))] md:border-t-0">
        <div class="flex items-center gap-2.5 border-b border-border/50 px-6 py-4">
            <svg class="h-4 w-4 shrink-0 text-brand-600" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            <span class="text-base font-semibold" th:text="#{admin.allowedMacs.form.toggle}">
                Add entry
            </span>
        </div>

        <form class="flex flex-1 flex-col gap-5 px-6 py-6"
              th:object="${allowedMac}"
              th:hx-post="@{/admin/allowed-mac}"
              hx-target="#allowed-mac-list"
              hx-swap="outerHTML">
            <div class="space-y-2">
                <label class="label" for="allowed-mac-input"
                       th:text="#{admin.allowedMacs.mac}">MAC address</label>
                <input id="allowed-mac-input"
                       class="input font-mono tracking-wider"
                       th:field="*{mac}"
                       type="text"
                       required
                       autocomplete="off"
                       spellcheck="false"
                       th:placeholder="#{admin.allowedMacs.mac.placeholder}"/>
                <input id="allowed-mac-hostname" type="hidden" th:field="*{hostname}"/>
                <p class="text-xs font-medium text-danger" th:if="${allowedMacErrorKey != null}"
                   th:text="#{${allowedMacErrorKey}}">Invalid MAC address.</p>
            </div>

            <div class="space-y-2">
                <label class="label" for="allowed-mac-validity"
                       th:text="#{admin.allowedMacs.validity}">Duration</label>
                <div class="relative">
                    <select id="allowed-mac-validity" class="select appearance-none"
                            th:field="*{validityMinutes}" required>
                        <option value="0" th:text="#{admin.allowedMacs.permanent}">Permanent</option>
                        <option value="30" th:text="#{admin.allowedMacs.validity.30}">30 min</option>
                        <option value="60" th:text="#{admin.allowedMacs.validity.60}">60 min</option>
                        <option value="240" th:text="#{admin.allowedMacs.validity.240}">4 h</option>
                        <option value="1440" th:text="#{admin.allowedMacs.validity.1440}">24 h</option>
                        <option value="2880" th:text="#{admin.allowedMacs.validity.2880}">2 days</option>
                        <option value="4320" th:text="#{admin.allowedMacs.validity.4320}">3 days</option>
                        <option value="10080" th:text="#{admin.allowedMacs.validity.10080}">7 days</option>
                    </select>
                    <img th:src="@{/assets/shared/icons/outline/chevron-down.svg}" alt=""
                         class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 opacity-50"/>
                </div>
            </div>

            <div class="space-y-2">
                <label class="label" for="allowed-mac-note">
                    <span th:text="#{admin.allowedMacs.note.label}">Note</span>
                    <span class="ml-1 normal-case font-normal tracking-normal text-text-muted"
                          th:text="${'(' + #messages.msg('admin.allowedMacs.note.optional') + ')'}">(optional)</span>
                </label>
                <input id="allowed-mac-note"
                       class="input"
                       type="text"
                       th:field="*{note}"
                       th:placeholder="#{admin.allowedMacs.note.placeholder}"/>
            </div>

            <div class="mt-auto pt-2">
                <button class="btn btn-primary w-full justify-center" type="submit">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
                    </svg>
                    <span class="btn-text" th:text="#{admin.allowedMacs.add}">Allow device</span>
                    <span class="spinner"></span>
                </button>
                <p class="mt-3 text-center text-xs leading-relaxed text-text-muted"
                   th:text="#{admin.allowedMacs.form.help}">
                    Open Network clients below to select a device directly.
                </p>
            </div>
        </form>
    </div>
</div>
