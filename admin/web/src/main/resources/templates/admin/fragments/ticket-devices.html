<div th:fragment="devicesSwap" xmlns:th="http://www.thymeleaf.org">
    <span
            th:attr="id=${'ticket-device-count-' + ticketId}"
            hx-swap-oob="true"
            th:text="${deviceCount}">0</span>

    <div
            th:attr="id=${'ticket-device-list-' + ticketId}"
            hx-swap-oob="true"
            class="grid gap-4 md:grid-cols-2">
        <div th:if="${devices == null or devices.isEmpty()}" class="admin-empty-state md:col-span-2 text-sm text-text-muted"
             th:text="#{admin.ticket.active.devices.empty}">
            No connected devices yet.
        </div>

        <div th:if="${devices != null and !devices.isEmpty()}" th:each="device : ${devices}" class="device-row">
            <div class="flex items-start justify-between gap-4">
                <div class="flex items-start gap-4">
                    <span class="flex h-12 w-12 items-center justify-center rounded-[1.25rem] bg-brand-100 text-brand-700">
                        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 16h6"/>
                        </svg>
                    </span>
                    <div class="space-y-2">
                        <div class="text-lg font-semibold tracking-[-0.03em]"
                             th:text="${device.displayName != null and !#strings.isEmpty(device.displayName) ? device.displayName : ((device.deviceName != null and !#strings.isEmpty(device.deviceName)) ? device.deviceName : #messages.msg('admin.ticket.active.devices.unknown'))}">
                            Unknown device name
                        </div>
                        <div class="font-mono text-xs text-text-muted" th:text="${device.mac}">AA:BB:CC:DD:EE:FF</div>
                    </div>
                </div>

                <span th:if="${kickedMacs != null and kickedMacs.contains(device.mac)}"
                      class="badge bg-danger/10 text-danger"
                      th:text="#{admin.ticket.active.devices.status.kicked}">
                    Disconnected
                </span>
                <span th:if="${(kickedMacs == null or !kickedMacs.contains(device.mac)) and device.wasAccessRevoked}"
                      class="badge bg-warning/10 text-text"
                      th:text="#{admin.ticket.active.devices.status.canceled}">
                    Canceled
                </span>
                <span th:if="${(kickedMacs == null or !kickedMacs.contains(device.mac)) and !device.wasAccessRevoked}"
                      class="badge bg-success/10 text-success"
                      th:text="#{admin.ticket.active.devices.status.active}">
                    Active
                </span>
            </div>

            <div class="mt-5 flex items-center justify-end">
                <button th:if="${!device.wasAccessRevoked and (kickedMacs == null or !kickedMacs.contains(device.mac))}"
                        class="btn btn-secondary"
                        type="button"
                        th:hx-post="@{/admin/ticket/{ticketId}/device/_kick(ticketId=${ticketId},mac=${device.mac})}"
                        th:hx-confirm="#{admin.ticket.active.devices.kick.confirm}"
                        hx-swap="none">
                    <span class="btn-text" th:text="#{admin.ticket.active.devices.kick}">Disconnect</span>
                    <span class="spinner"></span>
                </button>
            </div>
        </div>
    </div>
</div>
