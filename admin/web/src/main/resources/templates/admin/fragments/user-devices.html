<!DOCTYPE html>
<div th:fragment="userDeviceList" xmlns:th="http://www.thymeleaf.org" id="user-device-list" class="hero-shell">
    <div class="relative z-10 space-y-6">
        <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div class="space-y-2">
                <h1 class="hero-title" th:text="#{admin.devices.title}">My devices</h1>
            </div>
            <span class="badge self-start bg-brand-500 px-4 py-2 text-white"
                  th:text="${devices != null ? devices.size() : 0} + ' ' + #{admin.devices.count}">
                0 devices
            </span>
        </div>

        <div class="admin-tab-bar" th:if="${canViewAllDevices}">
            <a class="admin-tab"
               th:classappend="${deviceScope == 'mine'} ? ' admin-tab-active'"
               th:href="@{/admin/devices(scope='mine')}"
               th:hx-get="@{/admin/devices/_list(scope='mine')}"
               th:attr="hx-push-url=@{/admin/devices(scope='mine')}"
               hx-target="#user-device-list"
               hx-swap="outerHTML"
               th:text="#{admin.devices.scope.mine}">
                My devices
            </a>
            <a class="admin-tab"
               th:classappend="${deviceScope == 'all'} ? ' admin-tab-active'"
               th:href="@{/admin/devices(scope='all')}"
               th:hx-get="@{/admin/devices/_list(scope='all')}"
               th:attr="hx-push-url=@{/admin/devices(scope='all')}"
               hx-target="#user-device-list"
               hx-swap="outerHTML"
               th:text="#{admin.devices.scope.all}">
                All devices
            </a>
        </div>

        <div th:if="${devices == null or devices.isEmpty()}" class="admin-empty-state">
            <span class="admin-empty-icon">
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M7 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 16h6"/>
                </svg>
            </span>
            <p class="text-sm text-text-muted" th:text="#{admin.devices.empty}">No devices found.</p>
        </div>

        <ul th:if="${devices != null and !devices.isEmpty()}"
            class="overflow-hidden rounded-2xl border border-border/50 divide-y divide-border/40">
            <li th:each="device : ${devices}"
                class="device-row flex-col items-stretch gap-3 sm:flex-row sm:items-center sm:gap-3.5">
                <div class="flex min-w-0 flex-1 items-center gap-3.5">
                    <span class="admin-device-icon shrink-0">
                        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M7 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 16h6"/>
                        </svg>
                    </span>
                    <div class="min-w-0 flex-1">
                        <div class="flex flex-wrap items-baseline gap-2">
                            <span class="min-w-0 device-name"
                                  th:text="${device.name != null and !#strings.isEmpty(device.name) ? device.name : #messages.msg('admin.devices.unknown.name')}">
                                Unknown device
                            </span>
                            <span class="badge bg-brand-100 text-[10px] font-semibold uppercase tracking-wide text-brand-700"
                                  th:if="${device.isRandomized}"
                                  th:text="#{admin.devices.randomized}">
                                Randomized
                            </span>
                        </div>
                        <div class="mt-0.5 flex flex-col sm:flex-row items-start sm:items-center sm:flex-wrap sm:gap-x-1.5">
                            <span class="font-mono text-[11px] text-text-muted" th:text="${device.mac}">AA:BB:CC:DD:EE:FF</span>
                            <span class="text-[10px] text-text-muted opacity-50 hidden sm:inline">·</span>
                            <span class="text-[11px] text-text-muted"
                                  th:if="${device.hostname != null && device.hostname != ''}"
                                  th:text="#{admin.devices.hostname.label(${device.hostname != null ? device.hostname : '-'})}">Hostname: -</span>
                            <span class="text-[10px] text-text-muted opacity-50 hidden sm:inline"
                                  th:if="${device.hostname != null && device.hostname != ''}"
                            >·</span>
                            <span class="text-[11px] text-text-muted"
                                  th:text="#{admin.devices.authorizedAt.label(${@DateFormatter.absolute(device.authorizedAt)})}">Authorized: -</span>
                            <span class="text-[10px] text-text-muted opacity-50 hidden sm:inline">·</span>
                            <span class="text-[11px] text-text-muted"
                                  th:text="#{admin.devices.lastSeenAt.label(${@DateFormatter.timeRelativeNow(device.lastSeenAt)})}">Last seen: -</span>
                            <span th:if="${deviceScope == 'all'}"
                                  class="text-[10px] text-text-muted opacity-50 hidden sm:inline">·</span>
                            <span th:if="${deviceScope == 'all'}"
                                  class="text-[11px] text-text-muted">
                                <span th:text="#{admin.devices.owner.label}">Owner:</span>
                                <span class="owner-lookup group relative inline-flex font-mono"
                                      th:hx-get="@{/admin/users/{userId}/_display-name(userId=${device.userId})}"
                                      hx-trigger="mouseenter once, focusin once"
                                      hx-target="find .owner-lookup-popup-content"
                                      hx-swap="innerHTML"
                                      tabindex="0">
                                    <span th:text="${device.userId}">00000000-0000-0000-0000-000000000000</span>
                                    <span class="owner-lookup-popup absolute left-0 top-full z-20 mt-1 hidden w-max max-w-xs rounded-lg border border-border/60 bg-white px-2 py-1 text-xs font-sans text-text shadow-lg group-hover:block group-focus-within:block">
                                        <span class="owner-lookup-popup-content text-text-muted"
                                              th:text="#{admin.owner.lookup.loading}">Loading...</span>
                                    </span>
                                </span>
                            </span>
                        </div>
                        <p class="mt-0.5 text-xs text-danger" th:if="${device.disconnectError}"
                           th:text="#{admin.devices.deauthorize.error}">
                            Failed to disconnect device.
                        </p>
                    </div>
                </div>
                <button class="btn btn-danger shrink-0 self-end px-3 py-1.5 text-xs sm:self-auto"
                        type="button"
                        th:hx-post="@{/admin/devices/{mac}/_deauthorize(mac=${device.mac},userId=${device.userId},scope=${deviceScope})}"
                        th:hx-confirm="#{admin.devices.deauthorize.confirm}"
                        hx-target="#user-device-list"
                        hx-swap="outerHTML">
                    <span class="btn-text" th:text="#{admin.devices.deauthorize.action}">Disconnect</span>
                    <span class="spinner"></span>
                </button>
            </li>
        </ul>

        <div class="hidden"
             th:hx-get="@{/admin/devices/_list(scope=${deviceScope})}"
             hx-trigger="every 30s"
             hx-target="#user-device-list"
             hx-swap="outerHTML"></div>
    </div>
</div>
