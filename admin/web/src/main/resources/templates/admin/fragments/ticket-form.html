<form
    th:fragment="ticketForm(extraClass)"
    xmlns:th="http://www.thymeleaf.org"
    th:action="@{/admin/ticket}"
    th:object="${createTicket}"
    method="post"
    class="space-y-4"
    th:classappend="${extraClass}"
    th:hx-post="@{/admin/ticket}"
    hx-target="#ticket-panel"
    hx-swap="outerHTML"
>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="scope" th:if="${ticketScope != null}" th:value="${ticketScope}"/>

    <div class="space-y-1.5">
        <label
            class="label"
            for="validityMinutes"
            th:text="#{admin.ticket.create.validity.label}"
        >How long should the ticket be valid?</label>
        <div class="relative">
            <select class="select appearance-none" id="validityMinutes" name="validityMinutes">
                <option value="15" th:selected="${createTicket.validityMinutes == 15}" th:text="#{admin.ticket.validity.minutes(15)}">15 minutes</option>
                <option value="30" th:selected="${createTicket.validityMinutes == 30}" th:text="#{admin.ticket.validity.minutes(30)}">30 minutes</option>
                <option value="45" th:selected="${createTicket.validityMinutes == 45}" th:text="#{admin.ticket.validity.minutes(45)}">45 minutes</option>
                <option value="60" th:selected="${createTicket.validityMinutes == 60}" th:text="#{admin.ticket.validity.minutes(60)}">60 minutes</option>
                <option value="90" th:selected="${createTicket.validityMinutes == 90}" th:text="#{admin.ticket.validity.minutes(90)}">90 minutes</option>
                <option value="120" th:selected="${createTicket.validityMinutes == 120}" th:text="#{admin.ticket.validity.minutes(120)}">120 minutes</option>
                <option th:if="${canCreateExtendedTickets}" value="240" th:selected="${createTicket.validityMinutes == 240}" th:text="#{admin.ticket.validity.240}">4 hours</option>
                <option th:if="${canCreateExtendedTickets}" value="1440" th:selected="${createTicket.validityMinutes == 1440}" th:text="#{admin.ticket.validity.1440}">24 hours</option>
                <option th:if="${canCreateExtendedTickets}" value="2880" th:selected="${createTicket.validityMinutes == 2880}" th:text="#{admin.ticket.validity.2880}">2 days</option>
                <option th:if="${canCreateExtendedTickets}" value="4320" th:selected="${createTicket.validityMinutes == 4320}" th:text="#{admin.ticket.validity.4320}">3 days</option>
                <option th:if="${canCreateExtendedTickets}" value="10080" th:selected="${createTicket.validityMinutes == 10080}" th:text="#{admin.ticket.validity.10080}">7 days</option>
            </select>
            <img
                th:src="@{/assets/shared/icons/outline/chevron-down.svg}"
                alt=""
                class="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 opacity-70"
            />
        </div>
    </div>

    <div class="space-y-2">
        <label class="checkbox-label">
            <input
                class="checkbox"
                type="checkbox"
                name="requireUserNameOnLogin"
                value="true"
                th:checked="${createTicket.requireUserNameOnLogin}"
            />
            <span class="inline-flex items-center gap-2">
                <span th:text="#{admin.ticket.create.requireName.label}">Require user name during login</span>
                <span
                    class="tooltip"
                    th:attr="data-tooltip=#{admin.ticket.create.requireName.help}"
                >
                    <button
                        type="button"
                        class="tooltip-icon"
                        th:attr="aria-label=#{admin.ticket.create.requireName.help}"
                    >
                        <img
                            th:src="@{/assets/shared/icons/outline/help-circle.svg}"
                            alt=""
                            class="h-4 w-4"
                        />
                    </button>
                </span>
            </span>
        </label>
    </div>

    <button class="btn btn-primary w-full justify-center" type="submit">
        <span class="btn-text" th:text="#{admin.ticket.create.submit}">Create</span>
        <span class="spinner"></span>
    </button>
</form>
