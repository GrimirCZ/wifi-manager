spring:
  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 0
      chain:
        cache: false
  docker:
    compose:
      file: file:${PROJECT_ROOT:.}/app/compose.yml
  devtools:
    restart:
      enabled: true
      additional-paths:
        - ${PROJECT_ROOT:.}/admin
        - ${PROJECT_ROOT:.}/captive
        - ${PROJECT_ROOT:.}/shared
    livereload:
      enabled: true
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:8081/realms/wifimanager
        registration:
          admin:
            provider: keycloak
            client-id: admin-web
            client-secret: admin-web-secret
            scope:
              - openid
              - profile
              - email
              - roles
wifimanager:
  security:
    oidc-registration-id: admin
    authorities-provider-by-registration:
      admin: keycloak-realm-roles
  wifi:
    ssid: my-wifi
  captive:
    request-routing:
      # Example captive client subnets:
      # ipv4-subnets:
      #   - 10.42.0.0/16
      # ipv6-subnets:
      #   - 2001:db8:42::/64
      ipv4-subnets:
        - 127.0.0.0/8
      ipv6-subnets:
        - ::1/128
    portal:
      public-base-url: https://localhost
    router-agent:
      grpc:
        port: 9091
        tls:
          enabled: false
          require-client-auth: false
      type: dummy
    auth:
      keycloak:
        enabled: true
        issuer-uri: http://localhost:8081/realms/wifimanager
        client-id: captive-portal
        client-secret: captive-portal-secret
        allowed-devices-by-role: WIFI_STAFF=1;WIFI_ADMIN=5
