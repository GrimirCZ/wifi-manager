version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/GrimirCZ/wifi-manager/routeragent/internal/routeragentpb
      path: src/main/proto/router_agent.proto
    - file_option: go_package
      value: github.com/wifi-manager/routeragent/internal/routeragentpb
      path: router_agent.proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/routeragentpb
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: internal/routeragentpb
    opt:
      - paths=source_relative
