interface=ens1
bind-interfaces
user=dnsmasq
group=dnsmasq

dhcp-authoritative
dhcp-range=10.42.30.50,10.42.30.250,255.255.255.0,12h
dhcp-option=option:router,10.42.30.1
dhcp-option=option:dns-server,10.42.30.1
dhcp-option=option:domain-name,wifi.example.test
dhcp-option=114,https://wifi.example.test/captive/api

domain=wifi.example.test
local=/wifi.example.test/
interface-name=wifi.example.test,ens1

domain-needed
bogus-priv
server=1.1.1.1
server=8.8.8.8

dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.wifi.leases
log-dhcp
log-facility=-
