<!DOCTYPE html>
<div th:fragment="languageSwitcher(labelText, enText, csText)"
     xmlns:th="http://www.thymeleaf.org"
     class="relative group">
    <button
        type="button"
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-text-muted transition hover:bg-surface-muted focus:outline-none focus:ring-2 focus:ring-brand-500"
        aria-haspopup="menu"
        aria-label="Language"
    >
        <img th:if="${#locale.language == 'cs'}" th:src="@{/assets/shared/flags/cz.svg}" alt="" class="h-4 w-4 rounded-sm"/>
        <img th:if="${#locale.language != 'cs'}" th:src="@{/assets/shared/flags/gb.svg}" alt="" class="h-4 w-4 rounded-sm"/>
        <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.25a.75.75 0 0 1-1.06 0L5.21 8.29a.75.75 0 0 1 .02-1.08Z" clip-rule="evenodd"/>
        </svg>
    </button>
    <div
        role="menu"
        class="absolute right-0 z-20 mt-0 hidden w-44 overflow-hidden rounded-xl border border-border bg-surface py-2 shadow-lg group-hover:block group-focus-within:block"
    >
        <div class="px-4 pb-1 pt-2 text-xs font-semibold uppercase tracking-wide text-text-muted"
             th:text="${labelText}">Language</div>
        <a class="flex items-center gap-2 px-4 py-2 text-sm no-underline text-text hover:bg-surface-muted"
           th:classappend="${#locale.language == 'en'} ? ' font-semibold text-brand-600'"
           href="?lang=en" role="menuitem">
            <img th:src="@{/assets/shared/flags/gb.svg}" alt="" class="h-4 w-4 rounded-sm"/>
            <span th:text="${enText}">English</span>
        </a>
        <a class="flex items-center gap-2 px-4 py-2 text-sm no-underline text-text hover:bg-surface-muted"
           th:classappend="${#locale.language == 'cs'} ? ' font-semibold text-brand-600'"
           href="?lang=cs" role="menuitem">
            <img th:src="@{/assets/shared/flags/cz.svg}" alt="" class="h-4 w-4 rounded-sm"/>
            <span th:text="${csText}">Czech</span>
        </a>
    </div>
</div>
